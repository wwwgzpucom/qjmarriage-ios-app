<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>齐家婚姻</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="theme-color" content="#31d53d" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      
      #webview-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      
      #webview {
        width: 100%;
        height: 100%;
        border: none;
      }
      
      #loading {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #31d53d;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      #loading.hidden {
        display: none;
      }
      
      .error-message {
        color: #ff3b30;
        padding: 20px;
        text-align: center;
      }
      
      .retry-button {
        margin-top: 20px;
        padding: 10px 30px;
        background: #31d53d;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">
        <div class="spinner"></div>
        <p>正在加载...</p>
      </div>
      <div id="webview-container">
        <iframe id="webview" allow="camera; microphone; geolocation"></iframe>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
