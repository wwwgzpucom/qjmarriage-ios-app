name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web assets
      run: npm run build
    
    - name: Generate iOS icons
      run: npm run generate-icons
    
    - name: Sync Capacitor
      run: npx cap sync ios
    
    - name: Check for Podfile
      id: check_podfile
      run: |
        if [ -f "ios/App/Podfile" ]; then
          echo "has_podfile=true" >> $GITHUB_OUTPUT
          echo "✅ Podfile found, will use CocoaPods"
        else
          echo "has_podfile=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No Podfile found, using Swift Package Manager"
        fi
    
    - name: Install CocoaPods dependencies
      if: steps.check_podfile.outputs.has_podfile == 'true'
      run: |
        cd ios/App
        pod install
    
    - name: List Xcode versions
      run: ls /Applications/ | grep Xcode
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Import Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      run: |
        echo "📦 Importing certificate..."
        echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
        
        # Create keychain
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        
        # Import certificate
        security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
        
        # Verify
        security find-identity -v -p codesigning
        echo "✅ Certificate imported successfully"
    
    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      run: |
        echo "📦 Installing provisioning profile..."
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        echo "✅ Provisioning profile installed"
    
    - name: Build & Archive iOS app
      run: |
        cd ios/App
        echo "🔨 Building and archiving..."
        
        # 检查是否使用 CocoaPods (workspace) 或 SPM (project)
        if [ -f "App.xcworkspace/contents.xcworkspacedata" ]; then
          echo "Building with workspace (CocoaPods)"
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
        else
          echo "Building with project (SPM)"
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive
        fi
        
        echo "✅ Archive created successfully"
    
    - name: Export IPA
      run: |
        cd ios/App
        echo "📦 Exporting IPA..."
        xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/ipa
        
        echo "✅ IPA exported successfully"
        ls -lh build/ipa/
    
    - name: Upload to App Store Connect
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        cd ios/App
        echo "🚀 Uploading to App Store Connect..."
        xcrun altool --upload-app \
          -f build/ipa/App.ipa \
          -t ios \
          -u "$APPLE_ID" \
          -p "$APPLE_APP_SPECIFIC_PASSWORD" \
          --team-id "$APPLE_TEAM_ID"
        
        echo "✅ Upload completed successfully!"
    
    - name: Upload IPA artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-store-ipa
        path: ios/App/build/ipa/App.ipa
