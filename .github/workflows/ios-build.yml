name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web assets
      run: npm run build
    
    - name: Sync Capacitor
      run: npx cap sync ios
    
    - name: Check for Podfile
      id: check_podfile
      run: |
        if [ -f "ios/App/Podfile" ]; then
          echo "has_podfile=true" >> $GITHUB_OUTPUT
          echo "✅ Podfile found, will use CocoaPods"
        else
          echo "has_podfile=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No Podfile found, using Swift Package Manager"
        fi
    
    - name: Install CocoaPods dependencies
      if: steps.check_podfile.outputs.has_podfile == 'true'
      run: |
        cd ios/App
        pod install
    
    - name: List Xcode versions
      run: ls /Applications/ | grep Xcode
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build iOS app
      run: |
        cd ios/App
        # 检查是否使用 CocoaPods (workspace) 或 SPM (project)
        if [ -f "App.xcworkspace/contents.xcworkspacedata" ]; then
          echo "Building with workspace (CocoaPods)"
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
        else
          echo "Building with project (SPM)"
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
        fi
    
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
